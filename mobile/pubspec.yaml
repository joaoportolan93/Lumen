name: dreamshare
description: Dream Share - Rede social de sonhos.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^8.0.2
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.3.2

  # HTTP & API
  dio: ^5.4.0
  flutter_secure_storage: ^10.0.0

  # State Management
  provider: ^6.1.1

  # UI & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env
